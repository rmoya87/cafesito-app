name: Release Android to Google Play

on:
  push:
    tags:
      - "test*"
      - "alfa*"
      - "beta*"
      - "produccion*"

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configure keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "${KEYSTORE_BASE64}" ]]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret" >&2
            exit 1
          fi
          python - <<'PY'
          import base64
          import os
          data = os.environ.get("KEYSTORE_BASE64", "")
          if not data:
            raise SystemExit("Missing ANDROID_KEYSTORE_BASE64 secret")
          data = "".join(data.split())
          padding = (-len(data)) % 4
          if padding:
            data = data + ("=" * padding)
          with open("android-release.keystore", "wb") as f:
            try:
              f.write(base64.b64decode(data))
            except Exception as exc:
              raise SystemExit(f"Invalid ANDROID_KEYSTORE_BASE64 content: {exc}") from exc
          PY
          cat > keystore.properties <<EOF
          storeFile=android-release.keystore
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Configure google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [[ -z "${GOOGLE_SERVICES_JSON}" ]]; then
            echo "Missing GOOGLE_SERVICES_JSON secret" >&2
            exit 1
          fi
          mkdir -p app
          printf '%s' "${GOOGLE_SERVICES_JSON}" > app/google-services.json

      - name: Bump version
        run: ./scripts/bump_version.sh

      - name: Commit version bump
        run: |
          if git diff --quiet; then
            echo "No version changes detected"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore(release): bump version [skip ci]"
          git push

      - name: Build release bundle
        run: ./gradlew --no-daemon clean bundleRelease

      - name: Determine Play tracks
        id: tracks
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          TRACKS=""
          case "${TAG_NAME}" in
            test*)
              TRACKS="internal"
              ;;
            alfa*)
              TRACKS="internal,alpha"
              ;;
            beta*)
              TRACKS="internal,alpha,beta"
              ;;
            produccion*)
              TRACKS="internal,alpha,beta,production"
              ;;
            *)
              echo "Tag ${TAG_NAME} not supported" >&2
              exit 1
              ;;
          esac
          echo "tracks=${TRACKS}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.after;
            let notes = '';
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: sha,
            });
            if (prs.data.length) {
              notes = prs.data.map(pr => `- #${pr.number} ${pr.title}`).join('\n');
            } else if (context.payload.head_commit?.message) {
              notes = `- ${context.payload.head_commit.message}`;
            } else {
              notes = '- Release automático';
            }
            const promo = [
              '¡Nueva versión disponible! ☕️',
              'Mejoramos el rendimiento y la estabilidad para una experiencia más fluida.',
              'Nuevas mejoras en la app para que disfrutes más rápido tus funciones favoritas.',
              '¡Actualiza ahora y descubre lo nuevo en Cafesito!',
            ].join('\n');
            fs.mkdirSync('release-notes', { recursive: true });
            fs.writeFileSync('release-notes/whatsnew-es-ES', promo);

      - name: Upload to Google Play (internal)
        uses: r0adkll/upload-google-play@v1
        if: contains(steps.tracks.outputs.tracks, 'internal')
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON }}
          packageName: com.cafesito.app
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
          whatsNewDirectory: release-notes

      - name: Upload to Google Play (alpha)
        uses: r0adkll/upload-google-play@v1
        if: contains(steps.tracks.outputs.tracks, 'alpha')
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON }}
          packageName: com.cafesito.app
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: alpha
          status: draft
          whatsNewDirectory: release-notes

      - name: Upload to Google Play (beta)
        uses: r0adkll/upload-google-play@v1
        if: contains(steps.tracks.outputs.tracks, 'beta')
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON }}
          packageName: com.cafesito.app
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: beta
          status: draft
          whatsNewDirectory: release-notes

      - name: Upload to Google Play (production)
        uses: r0adkll/upload-google-play@v1
        if: contains(steps.tracks.outputs.tracks, 'production')
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON }}
          packageName: com.cafesito.app
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: production
          status: draft
          whatsNewDirectory: release-notes
