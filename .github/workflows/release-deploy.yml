# Workflow único: release Android (Play Console) y publicación webapp (Ionos) según rama.
# Todo el release/deploy (Android + webapp) se hace desde aquí; no hay otro workflow de deploy.
#
# RAMAS Y COMPORTAMIENTO
# - main: no se dispara (solo unificación de código).
# - Interna: si hay cambios en app/ o shared/ → sube AAB a Play Console (pruebas internas).
# - Alpha: si hay cambios en app/ o shared/ → sube AAB a Play; publica webApp en Ionos (/cafesito-web/app/).
# - Beta: si hay cambios en app/ o shared/ → sube AAB a Play; publica webApp en Ionos (/cafesito-web/app/).
# - Producción: si hay cambios en app/ o shared/ → sube AAB a Play; publica webApp en Ionos (/cafesito-web/app/).
#
# Webapp: los datos (cafés, etc.) se leen de Supabase en tiempo real; no hace falta desplegar por contenido.
# Este workflow solo publica el build y los HTML estáticos por café (SEO/previews). Esos HTMLs se regeneran
# cuando el webhook de Supabase (tabla coffees → Edge Function trigger-coffees-build → repository_dispatch)
# dispara este workflow, o cuando hay push a Alpha/Beta/Producción (código nuevo). Configurar el webhook para
# que altas/bajas de cafés actualicen SEO sin tocar Git.
#
# EJECUCIÓN MANUAL (Actions → Release & Deploy → Run workflow)
# Permite forzar release Android + publicación web sin hacer push: elige la rama y se ejecutan ambos jobs.
#
# Ver documentación en docs/RELEASE_DEPLOY_WORKFLOW.md

name: Release & Deploy

on:
  push:
    branches:
      - Interna
      - Alpha
      - alpha
      - Beta
      - beta
      - Producción
  workflow_dispatch:
    inputs:
      branch:
        description: 'Rama a usar (Interna, Alpha, Beta, Producción)'
        required: true
        default: 'Beta'
        type: choice
        options:
          - Interna
          - Alpha
          - Beta
          - Producción
  # Webhook desde Supabase: al crear/editar/eliminar un café se puede llamar a este evento para regenerar páginas estáticas.
  # Ver docs/supabase/webhook-coffees-trigger-build.md
  repository_dispatch:
    types: [supabase-coffees-changed]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-deploy-${{ github.event.inputs.branch || github.event.client_payload.branch || github.ref_name }}
  cancel-in-progress: true

env:
  TARGET_BRANCH: ${{ github.event.inputs.branch || github.event.client_payload.branch || github.ref_name }}

jobs:
  # Detecta qué ha cambiado para no subir por subir (en manual trigger se asume que hay cambios)
  changes:
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android || steps.manual.outputs.android || steps.webhook.outputs.android }}
      web: ${{ steps.filter.outputs.web || steps.manual.outputs.web || steps.webhook.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set changes for manual run
        if: github.event_name == 'workflow_dispatch'
        id: manual
        run: |
          echo "android=true" >> "$GITHUB_OUTPUT"
          echo "web=true" >> "$GITHUB_OUTPUT"

      - name: Set changes for Supabase webhook (solo deploy web)
        if: github.event_name == 'repository_dispatch' && github.event.action == 'supabase-coffees-changed'
        id: webhook
        run: |
          echo "android=false" >> "$GITHUB_OUTPUT"
          echo "web=true" >> "$GITHUB_OUTPUT"

      - uses: dorny/paths-filter@v3
        if: github.event_name == 'push'
        id: filter
        with:
          base: ${{ github.event.before }}
          ref: ${{ github.sha }}
          filters: |
            android:
              - 'app/**'
              - 'shared/**'
            web:
              - 'webApp/**'

  # Subida a Google Play solo si hay cambios en Android
  release-android:
    needs: changes
    if: |
      needs.changes.outputs.android == 'true' &&
      (contains(fromJSON('["Interna","Alpha","alpha","Beta","beta","Producción"]'), github.event.inputs.branch || github.ref_name))
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/heads/{0}', github.event.inputs.branch || github.ref_name) || github.sha }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configure keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "${KEYSTORE_BASE64}" ]]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret" >&2
            exit 1
          fi
          python3 - <<'PY'
          import base64
          import os
          data = os.environ.get("KEYSTORE_BASE64", "")
          if not data:
            raise SystemExit("Missing ANDROID_KEYSTORE_BASE64 secret")
          data = "".join(data.split())
          padding = (-len(data)) % 4
          if padding:
            data = data + ("=" * padding)
          with open("android-release.keystore", "wb") as f:
            try:
              f.write(base64.b64decode(data))
            except Exception as exc:
              raise SystemExit(f"Invalid ANDROID_KEYSTORE_BASE64 content: {exc}") from exc
          PY
          cat > keystore.properties <<EOF
          storeFile=android-release.keystore
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Configure google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [[ -z "${GOOGLE_SERVICES_JSON}" ]]; then
            echo "Missing GOOGLE_SERVICES_JSON secret" >&2
            exit 1
          fi
          mkdir -p app
          printf '%s' "${GOOGLE_SERVICES_JSON}" > app/google-services.json

      - name: Bump version
        run: ./scripts/bump_version.sh

      - name: Commit version bump
        run: |
          if git diff --quiet; then
            echo "No version changes detected"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore(release): bump version [skip ci]"
          git push origin "HEAD:${TARGET_BRANCH}"

      - name: Build release bundle
        run: ./gradlew --no-daemon clean bundleRelease

      - name: Determine Play track
        id: track
        run: |
          BRANCH="${TARGET_BRANCH}"
          TRACK=""
          case "${BRANCH}" in
            Interna)
              TRACK="internal"
              ;;
            Alpha|alpha)
              TRACK="alpha"
              ;;
            Beta|beta)
              TRACK="beta"
              ;;
            Producción)
              TRACK="production"
              ;;
            *)
              echo "Branch ${BRANCH} not supported for Play" >&2
              exit 1
              ;;
          esac
          echo "track=${TRACK}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        uses: actions/github-script@v7
        env:
          COMMIT_BEFORE: ${{ github.event.before }}
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const before = process.env.COMMIT_BEFORE;
            let commits = [];
            try {
              if (before) {
                const out = execSync(`git log ${before}..HEAD --pretty=format:%s --no-merges`, { encoding: 'utf8' });
                commits = out.trim().split('\n').filter(Boolean);
              }
              if (commits.length === 0) {
                const out = execSync('git log -12 --pretty=format:%s --no-merges', { encoding: 'utf8' });
                commits = out.trim().split('\n').filter(Boolean);
              }
            } catch (e) { commits = []; }
            const clean = (s) => (s || '')
              .replace(/\s*\[skip ci\]\s*/gi, '')
              .replace(/^(fix|feat|chore|docs|style|refactor|perf|test|build|ci)(\([^)]*\))?!?:\s*/i, '')
              .trim()
              .slice(0, 55);
            const lines = commits.slice(0, 6).map(m => clean(m)).filter(Boolean);
            const intros = [
              '¡Esta actualización viene cargada de café! ☕',
              '¿Listo para más Cafesito? Aquí va lo nuevo.',
              'Mejoramos la app mientras tú mejoras tu café.',
              'Más estabilidad, más sabor. Lo que sube en esta versión:',
            ];
            const intro = intros[Math.floor(Math.random() * intros.length)];
            const bullets = lines.length
              ? lines.map(l => '• ' + (l.charAt(0).toUpperCase() + l.slice(1)))
              : ['Mejoras y ajustes para que tu experiencia sea más fluida.'];
            let promo = [intro, '', ...bullets, '', '¡Gracias por usar Cafesito!'].join('\n');
            if (promo.length > 500) promo = promo.slice(0, 497) + '…';
            fs.mkdirSync('release-notes', { recursive: true });
            fs.writeFileSync('release-notes/whatsnew-es-ES', promo);

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON }}
          packageName: com.cafesito.app
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ steps.track.outputs.track }}
          status: completed
          whatsNewDirectory: release-notes

  # Deploy web a Ionos: SIEMPRE en Alpha, Beta y Producción (sube a /cafesito-web/app/)
  deploy-web:
    needs: changes
    if: contains(fromJSON('["Alpha","alpha","Beta","beta","Producción"]'), github.event.inputs.branch || github.event.client_payload.branch || github.ref_name)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webApp
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref || (github.event_name == 'workflow_dispatch' && format('refs/heads/{0}', github.event.inputs.branch)) || (github.event_name == 'repository_dispatch' && github.event.client_payload.branch && format('refs/heads/{0}', github.event.client_payload.branch)) || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webApp/package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Verificar config Supabase para build
        run: |
          if [[ -z "${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}" ]]; then
            echo "::error::Falta VITE_SUPABASE_URL. Añádela en Settings → Secrets and variables → Actions (como Secret o como Variable)."
            exit 1
          fi
          if [[ -z "${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}" ]]; then
            echo "::error::Falta VITE_SUPABASE_ANON_KEY. Añádela en Settings → Secrets and variables → Actions (como Secret o como Variable)."
            exit 1
          fi
          echo "VITE_SUPABASE_URL y VITE_SUPABASE_ANON_KEY configuradas."

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://cafesitoapp.com' }}

      - name: Hash lista cafés (prerender)
        id: coffee_hash
        run: |
          HASH=$(node scripts/get-coffee-prerender-hash.mjs)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}

      # Clave por resultado del build + lista de cafés: solo se regeneran HTMLs si cambia el build o los cafés.
      - name: Restaurar caché páginas café
        id: prerender_cache
        uses: actions/cache@v4
        with:
          path: webApp/dist/coffee
          key: coffee-prerender-${{ hashFiles('webApp/dist/index.html', 'webApp/dist/assets/**') }}-${{ steps.coffee_hash.outputs.hash }}

      - name: Prerender cafés (solo si cambió la lista o el código)
        if: steps.prerender_cache.outputs.cache-hit != 'true'
        run: node scripts/prerender-coffee-pages.mjs
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://cafesitoapp.com' }}

      - name: Actualizar sitemap/robots (si se usó caché)
        if: steps.prerender_cache.outputs.cache-hit == 'true'
        run: node scripts/update-sitemap-from-dist.mjs
        env:
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://cafesitoapp.com' }}

      - name: Check Ionos SSH/FTP secrets
        run: |
          if [[ -z "${{ secrets.IONOS_SSH_HOST }}" ]]; then
            echo "::error::Falta el secret IONOS_SSH_HOST. Añádelo en Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [[ -z "${{ secrets.IONOS_SSH_USER }}" ]]; then
            echo "::error::Falta el secret IONOS_SSH_USER. Añádelo en Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [[ -z "${{ secrets.IONOS_SSH_PASSWORD }}" ]]; then
            echo "::error::Falta el secret IONOS_SSH_PASSWORD. Añádelo en Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Secrets de Ionos configurados."

      - name: Deploy to Ionos via SFTP (/cafesito-web/app/)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.IONOS_SSH_HOST }}
          username: ${{ secrets.IONOS_SSH_USER }}
          port: ${{ secrets.IONOS_SSH_PORT || '22' }}
          password: ${{ secrets.IONOS_SSH_PASSWORD }}
          local_path: ./webApp/dist/*
          remote_path: /cafesito-web/app/
          sftp_only: true
          # Borrar contenido remoto antes de subir para que cada deploy sea limpio y no queden archivos viejos en caché
          delete_remote_files: true

      - name: Publish sitemap and robots at domain root (/cafesito-web/)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.IONOS_SSH_HOST }}
          username: ${{ secrets.IONOS_SSH_USER }}
          port: ${{ secrets.IONOS_SSH_PORT || '22' }}
          password: ${{ secrets.IONOS_SSH_PASSWORD }}
          local_path: ./webApp/dist/sitemap*
          remote_path: /cafesito-web/
          sftp_only: true
          delete_remote_files: false

      - name: Publish robots.txt at domain root (/cafesito-web/)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.IONOS_SSH_HOST }}
          username: ${{ secrets.IONOS_SSH_USER }}
          port: ${{ secrets.IONOS_SSH_PORT || '22' }}
          password: ${{ secrets.IONOS_SSH_PASSWORD }}
          local_path: ./webApp/dist/robots.txt
          remote_path: /cafesito-web/
          sftp_only: true
          delete_remote_files: false
