# Workflow único: release Android (Play Console) y publicación webapp (Ionos) según rama.
#
# --- TRIGGERS ---
# main NO debe lanzar: no está en branches y además los jobs tienen "if" que excluye push a main.
# 1) push a Interna/alpha/beta/Producción → despliega (ramas canónicas: alpha, beta en minúsculas).
# 2) workflow_dispatch → "Run workflow" en Actions.
# 3) schedule (cron 03:00 UTC) → nightly.
#
# --- QUÉ SE DESPLIEGA EN PUSH ---
# En push a alpha o beta: siempre se despliegan Android y webapp (para que "merge main → beta" despliegue).
# En push a otras ramas (Interna, Producción): solo se despliega si hay ficheros que impactan:
# - Android: ficheros en app/, shared/, gradle/, build.gradle.kts, etc.
# - Webapp: ficheros bajo webApp/.
# workflow_dispatch y schedule no usan filtro por ficheros (manual y cola Supabase).
# En workflow_dispatch se hace merge de main en la rama elegida antes de desplegar, para que
# "Solo webapp" o "Solo Android" desplieguen todos los cambios de main.
# Ver docs/RELEASE_DEPLOY_WORKFLOW.md

name: Release & Deploy

on:
  push:
    branches:
      - Interna
      - Interno
      - Alpha
      - alpha
      - Beta
      - beta
      - Producción
      - Produccion
  workflow_dispatch:
    inputs:
      branch:
        description: 'Rama a usar (Interna, alpha, beta, Producción)'
        required: true
        default: 'beta'
        type: choice
        options:
          - Interna
          - alpha
          - beta
          - Producción
      android_only:
        description: 'Solo Android (no desplegar webapp)'
        required: false
        default: false
        type: boolean
      web_only:
        description: 'Solo webapp (no desplegar Android)'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-deploy-${{ github.event.inputs.branch || github.ref_name || vars.NIGHTLY_DEPLOY_BRANCH || 'beta' }}
  cancel-in-progress: true

env:
  TARGET_BRANCH: ${{ github.event.inputs.branch || github.ref_name || vars.NIGHTLY_DEPLOY_BRANCH || 'beta' }}
  # Opt-in a Node 24 para acciones (evita aviso de deprecación de Node 20; ver https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # En "Run workflow" manual: actualiza la rama elegida con main para que el despliegue incluya todos los cambios de main
  sync-main-into-branch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: refs/heads/${{ env.TARGET_BRANCH }}

      - name: Merge main into branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main -m "Merge main into ${{ env.TARGET_BRANCH }} for deploy [skip ci]"
          git push origin "HEAD:${{ env.TARGET_BRANCH }}"

  changes:
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.beta_alpha_scope.outputs.android || steps.pathfilter.outputs.android || steps.scope.outputs.android || steps.decide.outputs.android }}
      web: ${{ steps.beta_alpha_scope.outputs.web || steps.pathfilter.outputs.webapp || steps.scope.outputs.web || steps.decide.outputs.web }}
      queue_response: ${{ steps.decide.outputs.queue_response || '' }}
    steps:
      - name: Always deploy both on push to alpha/beta
        if: github.event_name == 'push' && (github.ref == 'refs/heads/alpha' || github.ref == 'refs/heads/beta')
        id: beta_alpha_scope
        run: |
          echo "android=true" >> "$GITHUB_OUTPUT"
          echo "web=true" >> "$GITHUB_OUTPUT"

      - name: Checkout for file filter (push only)
        if: github.event_name == 'push'
        uses: actions/checkout@v5
        with:
          fetch-depth: 2
          # Usar la ref que disparó el push para evitar git exit 128 (ref no encontrada, p. ej. Beta vs beta)
          ref: ${{ github.ref }}

      - name: Detect changed files (push, ramas distintas de alpha/beta)
        if: github.event_name == 'push' && github.ref != 'refs/heads/alpha' && github.ref != 'refs/heads/beta'
        id: pathfilter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            android:
              - 'app/**'
              - 'shared/**'
              - 'gradle/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - 'gradle-wrapper.properties'
              - 'libs.versions.toml'
            webapp:
              - 'webApp/**'

      - name: Set scope for manual run (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: scope
        run: |
          if [ "${{ github.event.inputs.web_only }}" = "true" ]; then
            echo "android=false" >> "$GITHUB_OUTPUT"
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "android=true" >> "$GITHUB_OUTPUT"
            if [ "${{ github.event.inputs.android_only }}" = "true" ]; then
              echo "web=false" >> "$GITHUB_OUTPUT"
            else
              echo "web=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Decide nightly deploy scope from Supabase queue
        if: github.event_name == 'schedule'
        id: decide
        env:
          SUPABASE_DEPLOY_QUEUE_URL: ${{ secrets.SUPABASE_DEPLOY_QUEUE_URL }}
          SUPABASE_DEPLOY_QUEUE_TOKEN: ${{ secrets.SUPABASE_DEPLOY_QUEUE_TOKEN }}
        run: |
          echo "android=false" >> "$GITHUB_OUTPUT"
          if [[ -z "${SUPABASE_DEPLOY_QUEUE_URL}" ]]; then
            echo "::warning::Falta SUPABASE_DEPLOY_QUEUE_URL; se mantiene deploy web para no perder actualizaciones."
            echo "web=true" >> "$GITHUB_OUTPUT"
            echo "queue_response=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BODY='{"resource":"coffees","consume":false}'
          if [[ -n "${SUPABASE_DEPLOY_QUEUE_TOKEN}" ]]; then
            RESPONSE=$(curl -fsS -X POST "${SUPABASE_DEPLOY_QUEUE_URL}" \
              -H "content-type: application/json" \
              -H "x-deploy-token: ${SUPABASE_DEPLOY_QUEUE_TOKEN}" \
              -d "${BODY}")
          else
            RESPONSE=$(curl -fsS -X POST "${SUPABASE_DEPLOY_QUEUE_URL}" \
              -H "content-type: application/json" \
              -d "${BODY}")
          fi
          PENDING=$(printf '%s' "${RESPONSE}" | python3 -c "import sys, json; print(str(bool(json.load(sys.stdin).get('pending', False))).lower())")
          TOTAL=$(printf '%s' "${RESPONSE}" | python3 -c "import sys, json; print(int(json.load(sys.stdin).get('total', 0)))")
          ENCODED=$(printf '%s' "${RESPONSE}" | base64 -w 0)
          echo "queue_response=${ENCODED}" >> "$GITHUB_OUTPUT"
          echo "Supabase queue pending=${PENDING}, total=${TOTAL}"
          if [[ "${PENDING}" == "true" ]]; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "web=false" >> "$GITHUB_OUTPUT"
          fi


  # Subida a Google Play solo si hay cambios en Android
  release-android:
    needs: [changes, sync-main-into-branch]
    if: |
      always() &&
      (needs.sync-main-into-branch.result == 'success' || needs.sync-main-into-branch.result == 'skipped') &&
      needs.changes.outputs.android == 'true' &&
      (contains(fromJSON('["Interna","Interno","Alpha","alpha","Beta","beta","Producción","Produccion"]'), github.event.inputs.branch || github.ref_name || vars.NIGHTLY_DEPLOY_BRANCH || 'beta'))
    runs-on: ubuntu-latest
    steps:
      # En push usar la ref que disparó el workflow para evitar git exit 128 (ref no encontrada p. ej. Beta vs beta)
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'push' && github.ref || format('refs/heads/{0}', env.TARGET_BRANCH) }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configure keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "${KEYSTORE_BASE64}" ]]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret" >&2
            exit 1
          fi
          python3 - <<'PY'
          import base64
          import os
          data = os.environ.get("KEYSTORE_BASE64", "")
          if not data:
            raise SystemExit("Missing ANDROID_KEYSTORE_BASE64 secret")
          data = "".join(data.split())
          padding = (-len(data)) % 4
          if padding:
            data = data + ("=" * padding)
          with open("android-release.keystore", "wb") as f:
            try:
              f.write(base64.b64decode(data))
            except Exception as exc:
              raise SystemExit(f"Invalid ANDROID_KEYSTORE_BASE64 content: {exc}") from exc
          PY
          cat > keystore.properties <<EOF
          storeFile=android-release.keystore
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Configure google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [[ -z "${GOOGLE_SERVICES_JSON}" ]]; then
            echo "Missing GOOGLE_SERVICES_JSON secret" >&2
            exit 1
          fi
          mkdir -p app
          printf '%s' "${GOOGLE_SERVICES_JSON}" > app/google-services.json

      - name: Bump version
        run: ./scripts/bump_version.sh

      - name: Commit version bump
        run: |
          if git diff --quiet; then
            echo "No version changes detected"
            exit 0
          fi
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # En algunos entornos (p.ej. mirrors/Gerrit) puede existir push.pushOption=changesNotSentForReview
          # y provocar rechazos: "Changes are sent for review automatically...".
          # Lo limpiamos para este repo antes de hacer push del bump automático.
          git config --local --unset-all push.pushOption || true
          git add app/build.gradle.kts
          git commit -m "chore(release): bump version [skip ci]"
          # Stash cualquier otro cambio (p. ej. app/google-services.json) para poder rebasar con árbol limpio
          git stash push -u -m "ci-before-rebase" || true
          git fetch origin "${CURRENT_BRANCH}"
          git rebase "origin/${CURRENT_BRANCH}"
          git push origin "HEAD:${CURRENT_BRANCH}"
          git stash pop || true

      - name: Build release bundle
        run: ./gradlew --no-daemon clean bundleRelease

      - name: Determine Play track
        id: track
        run: |
          BRANCH="${TARGET_BRANCH}"
          TRACK=""
          case "${BRANCH}" in
            Interna|Interno)
              TRACK="internal"
              ;;
            Alpha|alpha)
              TRACK="alpha"
              ;;
            Beta|beta)
              TRACK="beta"
              ;;
            Producción|Produccion)
              TRACK="production"
              ;;
            *)
              echo "Branch ${BRANCH} not supported for Play" >&2
              exit 1
              ;;
          esac
          echo "track=${TRACK}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        uses: actions/github-script@v7
        env:
          TRACK: ${{ steps.track.outputs.track }}
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            // Solo commits que tocan Android (excluye webApp y docs solo-web)
            const androidPaths = "app/ shared/ gradle/ build.gradle.kts settings.gradle.kts gradle.properties gradle-wrapper.properties libs.versions.toml";
            const gitPathArgs = ` -- ${androidPaths.split(/\s+/).map(p => `'${p}'`).join(' ')}`;

            // Referencia SIEMPRE producción cuando exista: lo desplegado a beta/alpha debe recoger el "gap" con producción,
            // así cuando llegue a producción el usuario final ve todas las mejoras. Todo el texto de las notas, en español.
            const productionPrefix = 'deploy/android/production/';
            let refSince = null;
            try {
              const tagsOut = execSync(`git tag -l "${productionPrefix}*"`, { encoding: 'utf8' });
              const tags = tagsOut.trim().split(/\n/).filter(Boolean);
              const sorted = tags.map(t => {
                const num = parseInt(t.replace(productionPrefix, ''), 10);
                return { tag: t, num: isNaN(num) ? 0 : num };
              }).sort((a, b) => b.num - a.num);
              for (const { tag } of sorted) {
                try {
                  execSync(`git merge-base --is-ancestor ${tag} HEAD`, { stdio: 'pipe' });
                  refSince = tag;
                  break;
                } catch (_) { /* not ancestor, skip */ }
              }
              // Solo si no hay producción (p. ej. primera vez): usar tag de la pista actual
              if (!refSince && process.env.TRACK !== 'production') {
                const trackPrefix = `deploy/android/${process.env.TRACK || 'beta'}/`;
                const trackTagsOut = execSync(`git tag -l "${trackPrefix}*"`, { encoding: 'utf8' });
                const trackTags = trackTagsOut.trim().split(/\n/).filter(Boolean);
                const trackSorted = trackTags.map(t => {
                  const num = parseInt(t.replace(trackPrefix, ''), 10);
                  return { tag: t, num: isNaN(num) ? 0 : num };
                }).sort((a, b) => b.num - a.num);
                for (const { tag } of trackSorted) {
                  try {
                    execSync(`git merge-base --is-ancestor ${tag} HEAD`, { stdio: 'pipe' });
                    refSince = tag;
                    break;
                  } catch (_) {}
                }
              }
            } catch (_) {}

            // Siempre salida en español; nunca exponer mensaje de commit crudo (puede ser técnico o en inglés)
            function toFriendly(msg) {
              let s = (msg || '').replace(/\s*\[skip ci\]\s*/gi, '').replace(/\s*\(#\d+\)\s*$/i, '').trim();
              if (!s || /^chore\(release\):/i.test(s)) return '';
              s = s.replace(/^(fix|feat|chore|docs|refactor|style|test)(\([^)]*\))?!?:\s*/i, '').trim();
              const lower = s.toLowerCase();
              if (lower.includes('despensa') || lower.includes('pantry')) return 'Mejoras en tu despensa de café';
              if (lower.includes('diario') || lower.includes('diary')) return 'Retoques en tu diario';
              if (lower.includes('elaboración') || lower.includes('brew')) return 'Pequeñas mejoras al preparar tu café';
              if (lower.includes('modal') || lower.includes('terminado')) return 'Ajustes en los avisos de la app';
              if (lower.includes('perfil') || lower.includes('profile')) return 'Novedades en tu perfil';
              if (lower.includes('crash') || lower.includes('error') || lower.includes('fix')) return 'Corregimos detalles para que todo vaya mejor';
              if (lower.includes('ui') || lower.includes('pantalla') || lower.includes('screen')) return 'Pulimos cómo se ve la app';
              return 'Pequeñas mejoras y retoques';
            }

            const maxLen = 500;
            let promo;
            if (refSince) {
              let log;
              try {
                log = execSync(`git log ${refSince}..HEAD --no-merges --pretty=format:%s${gitPathArgs}`, { encoding: 'utf8' });
              } catch (_) { log = ''; }
              const raw = log.trim().split(/\n/).filter(Boolean);
              const friendly = raw.map(toFriendly).filter(Boolean);
              const unique = [...new Set(friendly)];
              const bullets = unique.slice(0, 12).map(s => '• ' + s);
              const intro = '¿Qué hay de nuevo?';
              promo = [intro, '', ...bullets, '', '¡Gracias por usar Cafesito!'].join('\n');
            } else {
              promo = 'Mejoras y correcciones. ¡Gracias por usar Cafesito!';
            }
            if (promo.length > maxLen) promo = promo.slice(0, maxLen - 3) + '…';
            fs.mkdirSync('release-notes', { recursive: true });
            fs.writeFileSync('release-notes/whatsnew-es-ES', promo);

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON }}
          packageName: com.cafesito.app
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ steps.track.outputs.track }}
          status: completed
          whatsNewDirectory: release-notes
          # debugSymbols: solo si el build genera app/build/outputs/native-debug-symbols/release (cuando hay deps nativas). Si no existe, omitir para no fallar.

      - name: Tag deployed version (for next release notes)
        run: |
          VERSION_CODE=$(grep -E 'versionCode\s*=' app/build.gradle.kts | head -n1 | sed -E 's/.*= ([0-9]+).*/\1/')
          TRACK="${{ steps.track.outputs.track }}"
          TAG="deploy/android/${TRACK}/${VERSION_CODE}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Android ${TRACK} v${VERSION_CODE} deployed to Play"
          git push origin "${TAG}"

      - name: Save last deployed version for next bump
        run: |
          VERSION_CODE=$(grep -E 'versionCode\s*=' app/build.gradle.kts | head -n1 | sed -E 's/.*= ([0-9]+).*/\1/')
          echo "${VERSION_CODE}" > scripts/last_deployed_version.txt
          echo "# Último versionCode desplegado con éxito en Play Console." >> scripts/last_deployed_version.txt
          echo "# El script bump_version.sh usa este valor para no repetir un code ya usado." >> scripts/last_deployed_version.txt
          if git diff --quiet scripts/last_deployed_version.txt; then
            echo "last_deployed_version.txt sin cambios (ya ${VERSION_CODE})"
            exit 0
          fi
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local --unset-all push.pushOption || true
          git add scripts/last_deployed_version.txt
          git commit -m "chore(release): last deployed versionCode ${VERSION_CODE} [skip ci]"
          git stash push -u -m "ci-before-rebase" || true
          git fetch origin "${CURRENT_BRANCH}"
          git rebase "origin/${CURRENT_BRANCH}"
          git push origin "HEAD:${CURRENT_BRANCH}"
          git stash pop || true

  # Deploy web a Ionos: en alpha, beta y Producción solo si web está en los cambios (no cuando android_only)
  deploy-web:
    needs: [changes, sync-main-into-branch]
    if: |
      always() &&
      (needs.sync-main-into-branch.result == 'success' || needs.sync-main-into-branch.result == 'skipped') &&
      needs.changes.outputs.web == 'true' &&
      contains(fromJSON('["Alpha","alpha","Beta","beta","Producción","Produccion"]'), github.event.inputs.branch || github.ref_name || vars.NIGHTLY_DEPLOY_BRANCH || 'beta')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webApp
    steps:
      # En push usar la ref que disparó el workflow para evitar exit 128 (ref no encontrada p. ej. Beta vs beta)
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'push' && github.ref || format('refs/heads/{0}', env.TARGET_BRANCH) }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webApp/package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Verificar config Supabase para build
        run: |
          if [[ -z "${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}" ]]; then
            echo "::error::Falta VITE_SUPABASE_URL. Añádela en Settings → Secrets and variables → Actions (como Secret o como Variable)."
            exit 1
          fi
          if [[ -z "${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}" ]]; then
            echo "::error::Falta VITE_SUPABASE_ANON_KEY. Añádela en Settings → Secrets and variables → Actions (como Secret o como Variable)."
            exit 1
          fi
          echo "VITE_SUPABASE_URL y VITE_SUPABASE_ANON_KEY configuradas."

      - name: Verificar Google Client ID para login
        run: |
          if [[ -z "${{ secrets.VITE_GOOGLE_CLIENT_ID || vars.VITE_GOOGLE_CLIENT_ID }}" ]]; then
            echo "::warning::Falta VITE_GOOGLE_CLIENT_ID. Añádela en Settings → Secrets and variables → Actions para que el botón de login con Google funcione en producción."
          else
            echo "VITE_GOOGLE_CLIENT_ID configurado."
          fi

      - name: Set app version (YYYYMMDD-VV)
        id: app-version
        run: |
          DATE_PART=$(date -u +%Y%m%d)
          VV=$(printf '%02d' $(( ${{ github.run_number }} % 100 )))
          echo "APP_VERSION=${DATE_PART}-${VV}" >> $GITHUB_ENV
          echo "App version: ${DATE_PART}-${VV}"

      - name: Build
        run: npm run build
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://cafesitoapp.com' }}
          VITE_GTM_CONTAINER_ID: ${{ vars.VITE_GTM_CONTAINER_ID || secrets.VITE_GTM_CONTAINER_ID || 'GTM-WLXN93VK' }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID || vars.VITE_GOOGLE_CLIENT_ID || '' }}

      - name: Save nightly queue payload
        if: github.event_name == 'schedule' && needs.changes.outputs.queue_response != ''
        run: |
          printf '%s' "${QUEUE_RESPONSE}" | base64 -d > .coffee-changes.json
          echo "queue payload bytes: $(wc -c < .coffee-changes.json)"
        env:
          QUEUE_RESPONSE: ${{ needs.changes.outputs.queue_response }}

      - name: Prerender coffee delta (nightly only)
        if: github.event_name == 'schedule' && needs.changes.outputs.queue_response != ''
        run: node scripts/prerender-coffee-delta.mjs .coffee-changes.json
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://cafesitoapp.com' }}

      - name: Update sitemap/robots from Supabase (nightly only)
        if: github.event_name == 'schedule'
        run: node scripts/update-sitemap-from-supabase.mjs
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://cafesitoapp.com' }}

      - name: Check Ionos SSH/FTP secrets
        run: |
          if [[ -z "${{ secrets.IONOS_SSH_HOST }}" ]]; then
            echo "::error::Falta el secret IONOS_SSH_HOST. Añádelo en Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [[ -z "${{ secrets.IONOS_SSH_USER }}" ]]; then
            echo "::error::Falta el secret IONOS_SSH_USER. Añádelo en Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [[ -z "${{ secrets.IONOS_SSH_PASSWORD }}" ]]; then
            echo "::error::Falta el secret IONOS_SSH_PASSWORD. Añádelo en Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Secrets de Ionos configurados."

      # .htaccess se sube con RewriteBase / (correcto cuando el dominio apunta a /cafesito-web/app como document root)
      - name: Deploy to Ionos via SFTP (/cafesito-web/app/)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.IONOS_SSH_HOST }}
          username: ${{ secrets.IONOS_SSH_USER }}
          port: ${{ secrets.IONOS_SSH_PORT || '22' }}
          password: ${{ secrets.IONOS_SSH_PASSWORD }}
          local_path: ./webApp/dist/*
          remote_path: /cafesito-web/app/
          sftp_only: true
          # Nunca borramos todo el remoto para preservar URLs de cafés no tocados.
          delete_remote_files: false

      # .well-known va dentro de la app para que /.well-known/assetlinks.json funcione (document root = /cafesito-web/app)
      - name: Deploy .well-known/assetlinks.json (App Links)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.IONOS_SSH_HOST }}
          username: ${{ secrets.IONOS_SSH_USER }}
          port: ${{ secrets.IONOS_SSH_PORT || '22' }}
          password: ${{ secrets.IONOS_SSH_PASSWORD }}
          local_path: ./webApp/dist/.well-known
          remote_path: /cafesito-web/app/
          sftp_only: true
          delete_remote_files: false

      - name: Delete removed coffee pages in remote (nightly only)
        if: github.event_name == 'schedule'
        env:
          IONOS_HOST: ${{ secrets.IONOS_SSH_HOST }}
          IONOS_USER: ${{ secrets.IONOS_SSH_USER }}
          IONOS_PORT: ${{ secrets.IONOS_SSH_PORT || '22' }}
          IONOS_PASSWORD: ${{ secrets.IONOS_SSH_PASSWORD }}
        run: |
          DELETE_FILE="dist/coffee-deletes.txt"
          if [[ ! -s "${DELETE_FILE}" ]]; then
            echo "No remote coffee paths to delete."
            exit 0
          fi

          sudo apt-get update -y
          sudo apt-get install -y sshpass

          while IFS= read -r REL_PATH || [[ -n "${REL_PATH}" ]]; do
            [[ -z "${REL_PATH}" ]] && continue
            echo "Deleting remote path: ${REL_PATH}"
            sshpass -p "${IONOS_PASSWORD}" ssh \
              -o StrictHostKeyChecking=no \
              -p "${IONOS_PORT}" \
              "${IONOS_USER}@${IONOS_HOST}" \
              "rm -rf '/cafesito-web/app/${REL_PATH}'"
          done < "${DELETE_FILE}"

      - name: Publish sitemap and robots at domain root (/cafesito-web/)
        if: github.event_name == 'schedule'
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.IONOS_SSH_HOST }}
          username: ${{ secrets.IONOS_SSH_USER }}
          port: ${{ secrets.IONOS_SSH_PORT || '22' }}
          password: ${{ secrets.IONOS_SSH_PASSWORD }}
          local_path: ./webApp/dist/sitemap*
          remote_path: /cafesito-web/
          sftp_only: true
          delete_remote_files: false

      - name: Publish robots.txt at domain root (/cafesito-web/)
        if: github.event_name == 'schedule'
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.IONOS_SSH_HOST }}
          username: ${{ secrets.IONOS_SSH_USER }}
          port: ${{ secrets.IONOS_SSH_PORT || '22' }}
          password: ${{ secrets.IONOS_SSH_PASSWORD }}
          local_path: ./webApp/dist/robots.txt
          remote_path: /cafesito-web/
          sftp_only: true
          delete_remote_files: false

      - name: Mark Supabase queue changes as consumed (nightly only, after successful deploy)
        if: github.event_name == 'schedule' && needs.changes.outputs.queue_response != ''
        env:
          SUPABASE_DEPLOY_QUEUE_URL: ${{ secrets.SUPABASE_DEPLOY_QUEUE_URL }}
          SUPABASE_DEPLOY_QUEUE_TOKEN: ${{ secrets.SUPABASE_DEPLOY_QUEUE_TOKEN }}
        run: |
          if [[ -z "${SUPABASE_DEPLOY_QUEUE_URL}" ]]; then
            echo "SUPABASE_DEPLOY_QUEUE_URL is empty. Skipping consume step."
            exit 0
          fi
          BODY='{"resource":"coffees","consume":true}'
          if [[ -n "${SUPABASE_DEPLOY_QUEUE_TOKEN}" ]]; then
            curl -fsS -X POST "${SUPABASE_DEPLOY_QUEUE_URL}" \
              -H "content-type: application/json" \
              -H "x-deploy-token: ${SUPABASE_DEPLOY_QUEUE_TOKEN}" \
              -d "${BODY}" > /dev/null
          else
            curl -fsS -X POST "${SUPABASE_DEPLOY_QUEUE_URL}" \
              -H "content-type: application/json" \
              -d "${BODY}" > /dev/null
          fi

      # Opcional: purgar caché CDN/proxy tras desplegar para que los usuarios vean la nueva versión de inmediato.
      # Configura el secret CACHE_PURGE_URL con la URL de tu API de purge (ej. Cloudflare, KeyCDN, etc.).
      - name: Purge cache after deploy (optional)
        env:
          CACHE_PURGE_URL: ${{ secrets.CACHE_PURGE_URL }}
        run: |
          if [[ -z "${CACHE_PURGE_URL}" ]]; then
            echo "CACHE_PURGE_URL not set. Skipping cache purge."
            exit 0
          fi
          echo "Purging cache..."
          if curl -fsS -X POST "${CACHE_PURGE_URL}"; then
            echo "Cache purge requested successfully."
          else
            echo "::warning::Cache purge request failed or URL returned non-2xx. Check CACHE_PURGE_URL and CDN docs."
          fi
