# Workflow único: release Android (Play Console) y publicación webapp (Ionos) según rama.
#
# --- TRIGGERS ---
# main NO debe lanzar: no está en branches y además los jobs tienen "if" que excluye push a main.
# 1) push a Interna/Alpha/Beta/Producción → despliega (el workflow se evalúa desde la rama por defecto).
# 2) workflow_dispatch → "Run workflow" en Actions.
# 3) schedule (cron 03:00 UTC) → nightly.
# Ver docs/RELEASE_DEPLOY_WORKFLOW.md

name: Release & Deploy

on:
  push:
    branches:
      - Interna
      - Interno
      - Alpha
      - alpha
      - Beta
      - beta
      - Producción
      - Produccion
  workflow_dispatch:
    inputs:
      branch:
        description: 'Rama a usar (Interna, Alpha, Beta, Producción)'
        required: true
        default: 'Beta'
        type: choice
        options:
          - Interna
          - Alpha
          - Beta
          - Producción
      android_only:
        description: 'Solo Android (no desplegar webapp)'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-deploy-${{ github.event.inputs.branch || github.ref_name || vars.NIGHTLY_DEPLOY_BRANCH || 'Beta' }}
  cancel-in-progress: true

env:
  TARGET_BRANCH: ${{ github.event.inputs.branch || github.ref_name || vars.NIGHTLY_DEPLOY_BRANCH || 'Beta' }}

jobs:
  changes:
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.scope.outputs.android || steps.decide.outputs.android }}
      web: ${{ steps.scope.outputs.web || steps.decide.outputs.web }}
    steps:
      - name: Set scope for push or manual run
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        id: scope
        run: |
          echo "android=true" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.android_only }}" = "true" ]; then
            echo "web=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ] && { [ "${{ github.ref_name }}" = "Interna" ] || [ "${{ github.ref_name }}" = "Interno" ]; }; then
            echo "web=false" >> "$GITHUB_OUTPUT"
          else
            echo "web=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide nightly deploy scope from Supabase queue
        if: github.event_name == 'schedule'
        id: decide
        env:
          SUPABASE_DEPLOY_QUEUE_URL: ${{ secrets.SUPABASE_DEPLOY_QUEUE_URL }}
          SUPABASE_DEPLOY_QUEUE_TOKEN: ${{ secrets.SUPABASE_DEPLOY_QUEUE_TOKEN }}
        run: |
          echo "android=false" >> "$GITHUB_OUTPUT"
          if [[ -z "${SUPABASE_DEPLOY_QUEUE_URL}" ]]; then
            echo "::warning::Falta SUPABASE_DEPLOY_QUEUE_URL; se mantiene deploy web para no perder actualizaciones."
            echo "web=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BODY='{"resource":"coffees","consume":true}'
          if [[ -n "${SUPABASE_DEPLOY_QUEUE_TOKEN}" ]]; then
            RESPONSE=$(curl -fsS -X POST "${SUPABASE_DEPLOY_QUEUE_URL}" \
              -H "content-type: application/json" \
              -H "x-deploy-token: ${SUPABASE_DEPLOY_QUEUE_TOKEN}" \
              -d "${BODY}")
          else
            RESPONSE=$(curl -fsS -X POST "${SUPABASE_DEPLOY_QUEUE_URL}" \
              -H "content-type: application/json" \
              -d "${BODY}")
          fi
          PENDING=$(printf '%s' "${RESPONSE}" | python3 -c "import sys, json; print(str(bool(json.load(sys.stdin).get('pending', False))).lower())")
          TOTAL=$(printf '%s' "${RESPONSE}" | python3 -c "import sys, json; print(int(json.load(sys.stdin).get('total', 0)))")
          echo "Supabase queue pending=${PENDING}, total=${TOTAL}"
          if [[ "${PENDING}" == "true" ]]; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "web=false" >> "$GITHUB_OUTPUT"
          fi

  # Subida a Google Play solo si hay cambios en Android
  release-android:
    needs: changes
    if: |
      needs.changes.outputs.android == 'true' &&
      (contains(fromJSON('["Interna","Interno","Alpha","alpha","Beta","beta","Producción","Produccion"]'), env.TARGET_BRANCH))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/heads/${{ env.TARGET_BRANCH }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configure keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "${KEYSTORE_BASE64}" ]]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret" >&2
            exit 1
          fi
          python3 - <<'PY'
          import base64
          import os
          data = os.environ.get("KEYSTORE_BASE64", "")
          if not data:
            raise SystemExit("Missing ANDROID_KEYSTORE_BASE64 secret")
          data = "".join(data.split())
          padding = (-len(data)) % 4
          if padding:
            data = data + ("=" * padding)
          with open("android-release.keystore", "wb") as f:
            try:
              f.write(base64.b64decode(data))
            except Exception as exc:
              raise SystemExit(f"Invalid ANDROID_KEYSTORE_BASE64 content: {exc}") from exc
          PY
          cat > keystore.properties <<EOF
          storeFile=android-release.keystore
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Configure google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [[ -z "${GOOGLE_SERVICES_JSON}" ]]; then
            echo "Missing GOOGLE_SERVICES_JSON secret" >&2
            exit 1
          fi
          mkdir -p app
          printf '%s' "${GOOGLE_SERVICES_JSON}" > app/google-services.json

      - name: Bump version
        run: ./scripts/bump_version.sh

      - name: Commit version bump
        run: |
          if git diff --quiet; then
            echo "No version changes detected"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore(release): bump version [skip ci]"
          git push origin "HEAD:${TARGET_BRANCH}"

      - name: Build release bundle
        run: ./gradlew --no-daemon clean bundleRelease

      - name: Determine Play track
        id: track
        run: |
          BRANCH="${TARGET_BRANCH}"
          TRACK=""
          case "${BRANCH}" in
            Interna|Interno)
              TRACK="internal"
              ;;
            Alpha|alpha)
              TRACK="alpha"
              ;;
            Beta|beta)
              TRACK="beta"
              ;;
            Producción|Produccion)
              TRACK="production"
              ;;
            *)
              echo "Branch ${BRANCH} not supported for Play" >&2
              exit 1
              ;;
          esac
          echo "track=${TRACK}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        uses: actions/github-script@v7
        env:
          COMMIT_BEFORE: ${{ github.event.before }}
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const before = process.env.COMMIT_BEFORE || '';
            let refSince = before;
            try {
              const tagsOut = execSync('git tag -l --sort=-v:refname', { encoding: 'utf8' });
              const tags = tagsOut.trim().split(/\n/).filter(Boolean);
              for (const tag of tags) {
                try {
                  execSync(`git merge-base --is-ancestor ${tag} HEAD`, { stdio: 'pipe' });
                  refSince = tag;
                  break;
                } catch (_) { /* tag not ancestor, skip */ }
              }
            } catch (_) { /* no tags or error, keep refSince */ }
            if (!refSince) {
              try {
                const d = execSync('git rev-parse HEAD~20', { encoding: 'utf8' }).trim();
                refSince = d;
              } catch (_) { refSince = 'HEAD~20'; }
            }
            let commitCount = 0;
            try {
              const out = execSync(`git rev-list --count ${refSince}..HEAD`, { encoding: 'utf8' });
              commitCount = parseInt(out.trim(), 10) || 0;
            } catch (_) {}
            const intros = [
              '¡Esta actualización viene cargada de café! ☕',
              '¿Listo para más Cafesito? Aquí va lo nuevo.',
              'Mejoramos la app mientras tú mejoras tu café.',
              'Otra versión con cariño para los amantes del café.',
              'Pequeños pasos para que Cafesito siga siendo tu compañero favorito.',
            ];
            const bullets = [
              'Pequeños retoques para que todo vaya sobre ruedas.',
              'Seguimos mejorando tu experiencia con cada taza.',
              'Más fluido y agradable de usar.',
              'Detalles que marcan la diferencia.',
              'Gracias por acompañarnos en este viaje.',
            ];
            const intro = intros[Math.floor(Math.random() * intros.length)];
            const numBullets = commitCount > 0 ? Math.min(3, 1 + Math.floor(commitCount / 5)) : 2;
            const chosen = [];
            const used = new Set();
            while (chosen.length < numBullets) {
              const i = Math.floor(Math.random() * bullets.length);
              if (!used.has(i)) { used.add(i); chosen.push(bullets[i]); }
            }
            const lines = chosen.map(b => '• ' + b);
            let promo = [intro, '', ...lines, '', '¡Gracias por usar Cafesito!'].join('\n');
            if (promo.length > 500) promo = promo.slice(0, 497) + '…';
            fs.mkdirSync('release-notes', { recursive: true });
            fs.writeFileSync('release-notes/whatsnew-es-ES', promo);

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON }}
          packageName: com.cafesito.app
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ steps.track.outputs.track }}
          status: completed
          whatsNewDirectory: release-notes
          changesNotSentForReview: true
          # debugSymbols: solo si el build genera app/build/outputs/native-debug-symbols/release (cuando hay deps nativas). Si no existe, omitir para no fallar.

  # Deploy web a Ionos: en Alpha, Beta y Producción solo si web está en los cambios (no cuando android_only)
  deploy-web:
    needs: changes
    if: |
      needs.changes.outputs.web == 'true' &&
      contains(fromJSON('["Alpha","alpha","Beta","beta","Producción","Produccion"]'), env.TARGET_BRANCH)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webApp
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/heads/${{ env.TARGET_BRANCH }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webApp/package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Verificar config Supabase para build
        run: |
          if [[ -z "${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}" ]]; then
            echo "::error::Falta VITE_SUPABASE_URL. Añádela en Settings → Secrets and variables → Actions (como Secret o como Variable)."
            exit 1
          fi
          if [[ -z "${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}" ]]; then
            echo "::error::Falta VITE_SUPABASE_ANON_KEY. Añádela en Settings → Secrets and variables → Actions (como Secret o como Variable)."
            exit 1
          fi
          echo "VITE_SUPABASE_URL y VITE_SUPABASE_ANON_KEY configuradas."

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://cafesitoapp.com' }}
          VITE_GA4_MEASUREMENT_ID: ${{ vars.VITE_GA4_MEASUREMENT_ID || secrets.VITE_GA4_MEASUREMENT_ID || '' }}

      - name: Hash lista cafés (prerender)
        id: coffee_hash
        run: |
          HASH=$(node scripts/get-coffee-prerender-hash.mjs)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}

      # Clave por resultado del build + lista de cafés: solo se regeneran HTMLs si cambia el build o los cafés.
      - name: Restaurar caché páginas café
        id: prerender_cache
        uses: actions/cache@v4
        with:
          path: webApp/dist/coffee
          key: coffee-prerender-${{ hashFiles('webApp/dist/index.html', 'webApp/dist/assets/**') }}-${{ steps.coffee_hash.outputs.hash }}

      - name: Prerender cafés (solo si cambió la lista o el código)
        if: steps.prerender_cache.outputs.cache-hit != 'true'
        run: node scripts/prerender-coffee-pages.mjs
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://cafesitoapp.com' }}

      - name: Actualizar sitemap/robots (si se usó caché)
        if: steps.prerender_cache.outputs.cache-hit == 'true'
        run: node scripts/update-sitemap-from-dist.mjs
        env:
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://cafesitoapp.com' }}

      - name: Check Ionos SSH/FTP secrets
        run: |
          if [[ -z "${{ secrets.IONOS_SSH_HOST }}" ]]; then
            echo "::error::Falta el secret IONOS_SSH_HOST. Añádelo en Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [[ -z "${{ secrets.IONOS_SSH_USER }}" ]]; then
            echo "::error::Falta el secret IONOS_SSH_USER. Añádelo en Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [[ -z "${{ secrets.IONOS_SSH_PASSWORD }}" ]]; then
            echo "::error::Falta el secret IONOS_SSH_PASSWORD. Añádelo en Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Secrets de Ionos configurados."

      - name: Ajustar .htaccess RewriteBase para subdirectorio (evita 500 al hacer F5)
        run: |
          HT=webApp/dist/.htaccess
          if [[ -f "$HT" ]]; then
            sed -i.bak 's|^RewriteBase /$|RewriteBase /cafesito-web/app/|' "$HT" && rm -f "${HT}.bak"
            grep "RewriteBase" "$HT" || true
          fi

      - name: Deploy to Ionos via SFTP (/cafesito-web/app/)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.IONOS_SSH_HOST }}
          username: ${{ secrets.IONOS_SSH_USER }}
          port: ${{ secrets.IONOS_SSH_PORT || '22' }}
          password: ${{ secrets.IONOS_SSH_PASSWORD }}
          local_path: ./webApp/dist/*
          remote_path: /cafesito-web/app/
          sftp_only: true
          # Borrar contenido remoto antes de subir para que cada deploy sea limpio y no queden archivos viejos en caché
          delete_remote_files: true

      - name: Publish sitemap and robots at domain root (/cafesito-web/)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.IONOS_SSH_HOST }}
          username: ${{ secrets.IONOS_SSH_USER }}
          port: ${{ secrets.IONOS_SSH_PORT || '22' }}
          password: ${{ secrets.IONOS_SSH_PASSWORD }}
          local_path: ./webApp/dist/sitemap*
          remote_path: /cafesito-web/
          sftp_only: true
          delete_remote_files: false

      - name: Publish robots.txt at domain root (/cafesito-web/)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.IONOS_SSH_HOST }}
          username: ${{ secrets.IONOS_SSH_USER }}
          port: ${{ secrets.IONOS_SSH_PORT || '22' }}
          password: ${{ secrets.IONOS_SSH_PASSWORD }}
          local_path: ./webApp/dist/robots.txt
          remote_path: /cafesito-web/
          sftp_only: true
          delete_remote_files: false
