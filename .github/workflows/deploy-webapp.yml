# Deploy solo de la webapp a Ionos.
#
# Se ejecuta:
# - Al hacer push a Alpha.
# - Manualmente: Actions → Deploy Webapp → Run workflow (elegir rama).
#
# Genera HTML estáticos por café (prerender con caché) para SEO y previews al compartir.
# La caché evita regenerar si no cambió la lista de cafés ni el código; no dependes de Git
# para cambios de contenido si usas el webhook de Supabase (tabla coffees → Edge Function →
# repository_dispatch) para disparar este workflow o Release & Deploy al dar de alta/baja un café.
# Requiere: VITE_SUPABASE_*, IONOS_SSH_*, y en servidor SPA fallback para rutas sin HTML estático.

name: Deploy Webapp

on:
  push:
    branches:
      - Alpha
      - alpha
  workflow_dispatch:
    inputs:
      branch:
        description: 'Rama a desplegar'
        required: true
        default: 'Alpha'
        type: choice
        options:
          - Alpha
          - Beta
          - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webApp
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/heads/{0}', github.event.inputs.branch) || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webApp/package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://cafesitoapp.com' }}

      - name: Hash lista cafés (prerender)
        id: coffee_hash
        run: |
          HASH=$(node scripts/get-coffee-prerender-hash.mjs)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}

      # Clave por resultado del build + lista de cafés: solo se regeneran HTMLs si cambia el build o los cafés.
      - name: Restaurar caché páginas café
        id: prerender_cache
        uses: actions/cache@v4
        with:
          path: webApp/dist/coffee
          key: coffee-prerender-${{ hashFiles('webApp/dist/index.html', 'webApp/dist/assets/**') }}-${{ steps.coffee_hash.outputs.hash }}

      - name: Prerender cafés (solo si cambió la lista o el código)
        if: steps.prerender_cache.outputs.cache-hit != 'true'
        run: node scripts/prerender-coffee-pages.mjs
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://cafesitoapp.com' }}

      - name: Actualizar sitemap/robots (si se usó caché)
        if: steps.prerender_cache.outputs.cache-hit == 'true'
        run: node scripts/update-sitemap-from-dist.mjs
        env:
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://cafesitoapp.com' }}

      - name: Deploy to Ionos
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.IONOS_SSH_HOST }}
          username: ${{ secrets.IONOS_SSH_USER }}
          port: ${{ secrets.IONOS_SSH_PORT || '22' }}
          password: ${{ secrets.IONOS_SSH_PASSWORD }}
          local_path: ./webApp/dist/*
          remote_path: /cafesito-web/app/
          sftp_only: true
          delete_remote_files: true
