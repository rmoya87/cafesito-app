<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSP: font-src incluye r2cdn.perplexity.ai por si el usuario tiene extensión que inyecta fuentes (evita error en consola). -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'self' https://*.supabase.co ws://localhost:4173 http://localhost:4173; img-src 'self' data: blob: https:; font-src 'self' data: https://r2cdn.perplexity.ai; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval';"
    />
    <meta name="description" content="Comunidad de café para compartir timeline, explorar cafés y seguir perfiles." />
    <link rel="icon" type="image/png" href="./logo.png" />
    <link rel="shortcut icon" href="./logo.png" />
    <link rel="apple-touch-icon" href="./logo.png" />
    <link rel="canonical" href="https://cafesito.app/" />
    <title>Cafesito</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Opcional en producción: si no usas .env al hacer build, descomenta y rellena para config de Supabase en runtime:
    <script>window.__SUPABASE_CONFIG__={url:"https://TU_PROYECTO.supabase.co",anonKey:"eyJ..."};</script>
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
