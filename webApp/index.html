<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#212121" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f7f7f7" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Cafesito" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="description" content="Comunidad de café para compartir timeline, explorar cafés y seguir perfiles." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://cafesitoapp.com/" />
    <link rel="alternate" hreflang="es" href="https://cafesitoapp.com/" />
    <link rel="alternate" hreflang="en" href="https://cafesitoapp.com/" />
    <link rel="alternate" hreflang="x-default" href="https://cafesitoapp.com/" />

    <!-- Open Graph / Twitter (home). Las páginas de café se prerenderizan con metas propias. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cafesitoapp.com/" />
    <meta property="og:title" content="Cafesito" />
    <meta
      property="og:description"
      content="Comunidad de café para compartir timeline, explorar cafés y seguir perfiles."
    />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:image" content="https://cafesitoapp.com/og/default.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@cafesitoapp" />
    <meta name="twitter:creator" content="@cafesitoapp" />
    <meta name="twitter:title" content="Cafesito" />
    <meta
      name="twitter:description"
      content="Comunidad de café para compartir timeline, explorar cafés y seguir perfiles."
    />
    <meta name="twitter:image" content="https://cafesitoapp.com/og/default.jpg" />
    <style>
      /* Critical CSS mínimo above-the-fold para mejorar LCP/FCP sin forzar modo oscuro */
      html,body,#root{margin:0;padding:0;min-height:100%;background:#f7f7f7;color:#1a120b}
      @media (prefers-color-scheme: dark){html,body,#root{background:#212121;color:#fff}}
      html.theme-light body,html.theme-light #root{background:#f7f7f7;color:#1a120b}
      html.theme-dark body,html.theme-dark #root{background:#212121;color:#fff}
      #root{contain:layout style paint}
    </style>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="shortcut icon" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="preload" as="image" href="/logo.png" />
    <link rel="apple-touch-startup-image" href="/splash.png" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/splash-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/splash-750x1294.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/splash.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Cafesito</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
